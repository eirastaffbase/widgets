<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estée Lauder — Today's Shift</title>
    <style>
        @font-face { font-family:"Optima"; font-weight:400; font-display:swap;
          src:url("https://media.elcompanies.com/files/e/estee-lauder-companies/global/fonts-latest/optima-roman-woff2.woff2") format("woff2"); }
        @font-face { font-family:"Optima"; font-weight:600; font-display:swap;
          src:url("https://media.elcompanies.com/files/e/estee-lauder-companies/global/fonts-latest/optima-semi-bold-woff2.woff2") format("woff2"); }
        @font-face { font-family:"Noto Sans"; font-weight:400; font-display:swap;
          src:url("https://fonts.gstatic.com/s/notosans/v9/o-0IIpQlx3QUlC5A4PNr5TRA.woff2") format("woff2");
          unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+2000-206F,U+2074,U+20AC,U+2122,U+2212,U+FEFF,U+FFFD; }
        @font-face { font-family:"Akzidenz Grotesk Black"; font-display:swap;
          src:url("Akzidenz-grotesk-black.ttf") format("truetype"); }

        :root {
            --navy:#040a2b; --white:#fff; --muted:#c8cbdb;
            --serif:"Optima","Palatino Linotype",Georgia,serif;
            --meta:"Noto Sans","Helvetica Neue",Helvetica,Arial,sans-serif;
            --caps:"Akzidenz Grotesk Black","Helvetica Neue",Arial,sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--meta); background:#fff; -webkit-font-smoothing:antialiased; }

        .shift-card { background:var(--navy); color:#fff; border:none; border-top:4px solid #fff; padding:24px; width:100%; max-width:none; }

        .header { display:flex; align-items:center; gap:9px; margin-bottom:16px; }
        .header svg { width:20px; height:20px; color:#fff; flex-shrink:0; }
        .date-text { font-family:var(--caps); font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }

        .time-section { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; gap:12px; }
        .shift-time { font-family:var(--serif); font-size:38px; font-weight:600; color:#fff; letter-spacing:-0.5px; line-height:1.05; }

        .swap-button { background:#fff; color:var(--navy); border:none; padding:11px 16px; font-family:var(--caps); font-size:11px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; display:flex; align-items:center; gap:7px; transition:opacity 0.2s; white-space:nowrap; }
        .swap-button svg { width:15px; height:15px; }
        .swap-button:hover { opacity:0.82; }

        .details { display:flex; flex-direction:column; gap:9px; border-top:1px solid rgba(255,255,255,0.15); padding-top:16px; }
        .detail-row { display:flex; gap:8px; font-size:13px; color:#fff; line-height:1.3; }
        .detail-label { font-family:var(--caps); font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); white-space:nowrap; align-self:center; }
        .detail-value { font-family:var(--meta); font-weight:500; }
    </style>
</head>
<body>
    <div class="shift-card">
        <div class="header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <div class="date-text" id="currentDate">Today, Jan 12</div>
        </div>

        <div class="time-section">
            <div class="shift-time">9:00 AM – 5:30&nbsp;PM</div>
            <button class="swap-button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg> Swap Shift</button>
        </div>

        <div class="details">
            <div class="detail-row"><span class="detail-label">Break</span><span class="detail-value">1:00 PM – 1:30&nbsp;PM</span></div>
            <div class="detail-row"><span class="detail-label">Zone</span><span class="detail-value">Main Floor · Skincare</span></div>
        </div>
    </div>

    <script>
        (function () {
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const now = new Date();
            document.getElementById('currentDate').textContent = `Today, ${months[now.getMonth()]} ${now.getDate()}`;
        })();
    </script>
</body>
</html>
