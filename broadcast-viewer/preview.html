<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broadcast Operations — Widget Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f5f3ee; min-height: 100vh; }
    .preview-label {
      font-size: 11px; font-weight: 700; letter-spacing: .6px;
      text-transform: uppercase; color: #9ca3af; text-align: center;
      padding: 12px 0 6px; font-family: system-ui, sans-serif;
    }
    #error-banner {
      display: none; background: #fee2e2; border: 1px solid #fca5a5;
      color: #991b1b; font-family: monospace; font-size: 13px;
      padding: 16px 20px; margin: 16px; border-radius: 8px; white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="preview-label">Widget Preview — Broadcast Operations</div>
  <div id="error-banner"></div>
  <div id="widget-root"></div>

  <script>
    function showError(msg) {
      var b = document.getElementById('error-banner');
      b.style.display = 'block';
      b.textContent = msg;
    }
    window.addEventListener('error', function(e) {
      showError('Uncaught error: ' + e.message + '\n' + (e.filename || '') + ':' + e.lineno);
    });
    window.addEventListener('unhandledrejection', function(e) {
      showError('Unhandled promise rejection: ' + (e.reason && (e.reason.message || e.reason)));
    });
  </script>

  <script src="./broadcast-ops-widget/dist/preview.js" onerror="showError('Failed to load preview.js — make sure you ran: npm run build inside broadcast-ops-widget/')"></script>
</body>
</html>
