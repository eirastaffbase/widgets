    --bg: #F7F7F7;
    --surface: #FFFFFF;
    --border: #E0E0E0;
    --text: #1A1A1A;
    --text-muted: #666;
    --text-hint: #999;

    --fail: #C0392B;

    --warn: #D68910;

  .header-logo svg { width: 22px; height: 22px; }
  .header-title { color: white; font-size: 17px; font-weight: 600; }
  .header-sub { color: rgba(255,255,255,0.75); font-size: 12px; }
  .progress-bar-wrap { background: rgba(0,0,0,0.25); height: 3px; }
  .progress-bar-fill { background: white; height: 3px; transition: width 0.4s ease; width: 0%; }

  .nav-tabs { display: flex; overflow-x: auto; background: var(--red-dark); scrollbar-width: none; }

  .nav-tab .tab-badge.has-fails { background: #FFD700; color: #7B3900; }

  /* SCREENS */
  .screen { display: none; padding: 16px; animation: fadeIn 0.2s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* CARDS */
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow); }
  .card-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .card-header-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .card-title { font-size: 15px; font-weight: 600; }
  .card-subtitle { font-size: 12px; color: var(--text-muted); }
  .card-body { padding: 14px 16px; }

  /* STORE MAPPING */
  .store-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }

  label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
  input[type=text], input[type=date], select, textarea {

  .store-lookup { display: flex; gap: 8px; }
  .store-lookup input { flex: 1; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--red); color: white; }
  .btn-primary:hover { background: var(--red-dark); }
  .btn-secondary { background: transparent; color: var(--red); border: 1.5px solid var(--red); }
  .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 6px; }
  .btn-full { width: 100%; }
  .btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 8px; background: var(--red-light); color: var(--red); border: 1.5px solid var(--red-mid); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .btn:active { transform: scale(0.97); }

  /* STORE INFO BANNER */
  .store-banner { background: var(--red); color: white; border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px; display: none; }

  .store-banner-row { display: flex; align-items: center; justify-content: space-between; }
  .store-banner h3 { font-size: 16px; font-weight: 700; }
  .store-banner p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .store-banner-meta { display: flex; gap: 16px; margin-top: 10px; }
  .store-banner-meta span { font-size: 12px; opacity: 0.85; }
  .store-badge { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 3px 10px; font-size: 12px; }

  /* QUESTION ITEMS */
  .question-item { border-bottom: 1px solid var(--border); padding: 14px 16px; }

  .q-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .q-id { background: var(--bg); color: var(--text-muted); font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 5px; border: 1px solid var(--border); flex-shrink: 0; margin-top: 2px; }

  .chip-pts { background: #EEF2FF; color: #3730A3; }
  .chip-type { background: #F0FFF4; color: #166534; }
  .chip-critical { background: #FFF0F2; color: var(--red); border: 1px solid var(--red-mid); }
  .chip-task { background: #FFF3CD; color: #7B5800; }

  /* RESPONSE CONTROLS */

  .pf-btn { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--text-muted); transition: all 0.15s; }
  .pf-btn:active { transform: scale(0.97); }
  .pf-btn.selected-pass { background: var(--pass-bg); border-color: var(--pass); color: var(--pass); }
  .pf-btn.selected-fail { background: var(--fail-bg); border-color: var(--fail); color: var(--fail); }
  .pf-btn.selected-na { background: #F5F5F5; border-color: #999; color: #555; }
  .rating-row { display: flex; gap: 6px; }
  .rating-btn { flex: 1; padding: 8px 4px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--text-muted); text-align: center; transition: all 0.15s; }
  .rating-btn.selected { background: var(--pass-bg); border-color: var(--pass); color: var(--pass); }
  .rating-btn.selected-low { background: var(--fail-bg); border-color: var(--fail); color: var(--fail); }
  .rating-btn.selected-mid { background: var(--warn-bg); border-color: var(--warn); color: var(--warn); }
  .temp-input, .num-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 16px; font-weight: 600; text-align: center; }
  .temp-input:focus, .num-input:focus { outline: none; border-color: var(--red); }

  /* STATUS PILLS */
  .status-pass { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; color: var(--pass); }
  .status-fail { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; color: var(--fail); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-pass { background: var(--pass); }
  .dot-fail { background: var(--fail); }

  /* TASK FLAG */
  .task-flag { background: #FFF3CD; border: 1px solid #F0D060; border-radius: 8px; padding: 10px 12px; margin-top: 10px; display: none; }
  .task-flag.visible { display: block; }

  .task-flag p { font-size: 12px; color: #5A3E00; line-height: 1.4; }

  /* COMMENT BOX */
  .comment-toggle { display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; cursor: pointer; margin-top: 8px; }
  .comment-box { margin-top: 8px; display: none; }

  /* SECTION DIVIDER */
  .section-header { display: flex; align-items: center; gap: 10px; padding: 10px 0 4px; }

  /* SCORE BAR */

  .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .score-big { font-size: 28px; font-weight: 700; color: var(--red); }
  .score-label { font-size: 12px; color: var(--text-muted); }
  .score-track { background: var(--border); border-radius: 4px; height: 8px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; background: var(--red); }
  .score-fill.passing { background: var(--pass); }

  /* TASKS PANEL */
  .task-item { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .task-item:last-child { border-bottom: none; }
  .task-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .task-title { font-size: 14px; font-weight: 600; flex: 1; }
  .priority-pill { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 12px; flex-shrink: 0; }
  .p-critical { background: #FFF0F2; color: var(--red); }
  .p-high { background: #FFE8E8; color: #A32D2D; }
  .p-medium { background: #FFF3E0; color: #7B4400; }
  .p-low { background: #E8F5E9; color: #1B5E20; }
  .task-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  /* EMPTY STATES */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-state-icon { font-size: 36px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  /* SUBMIT SCREEN */
  .submit-card { text-align: center; padding: 30px 20px; }
  .submit-icon { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 28px; }
  .submit-icon.warn { background: #FFF3CD; }
  .submit-icon.ok { background: var(--pass-bg); }
  .cat-score-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .cat-score-row:last-child { border-bottom: none; }

  /* TOAST */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1A1A1A; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* BOTTOM NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 6px 0 env(safe-area-inset-bottom, 0px); z-index: 50; }
  .bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 4px; cursor: pointer; color: var(--text-hint); font-size: 10px; font-weight: 500; transition: color 0.2s; }

  .bnav-icon-wrap { position: relative; }
  .main-content { padding-bottom: 75px; }
</style>
</head>

// STATE
const state = {
  storeId: null,
  storeInfo: null,
  auditorName: "",
  auditDate: new Date().toISOString().split("T")[0],
  auditType: "Full Audit",
  responses: {},
  comments: {},
  currentSection: "store",
  currentCat: CATEGORIES[0].id,
};

function getCatQuestions(catId) { return QUESTIONS.filter(q => q.cat === catId); }
function getResponse(id) { return state.responses[id] || null; }
function setResponse(id, val) { state.responses[id] = val; updateProgress(); renderBadges(); renderTasksPanel(); }
function getComment(id) { return state.comments[id] || ""; }
function setComment(id, val) { state.comments[id] = val; }

function isPass(q, val) {
  if (!val) return null;
  if (q.type === "pf") return val === "pass";
  if (q.type === "rating") return parseInt(val) >= 3;
  if (q.type === "temp") {
    const n = parseFloat(val);
    if (q.id.startsWith("BOH")) return n >= 35 && n <= 41;
    return n >= 140;
  }
  return true;
}

function getScore(q) {
  const val = getResponse(q.id);
  const p = isPass(q, val);
  if (p === null) return { earned: 0, answered: false };
  if (p) return { earned: q.pts, answered: true };
  return { earned: 0, answered: true };
}

function getTotalScore() {
  let earned = 0, total = 0, answered = 0;
  QUESTIONS.forEach(q => {
    total += q.pts;
    const s = getScore(q);
    earned += s.earned;
    if (s.answered) answered++;
  });
  return { earned, total, answered, count: QUESTIONS.length };
}

function getFailedTasks() {
  return QUESTIONS.filter(q => {
    if (!q.task) return false;
    const val = getResponse(q.id);
    return isPass(q, val) === false;
  });
}

function updateProgress() {
  const s = getTotalScore();
  const pct = s.count > 0 ? Math.round((s.answered / s.count) * 100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
  const tasks = getFailedTasks();
  const badge = document.getElementById("tasks-badge");
  if (tasks.length > 0) { badge.style.display = "flex"; badge.textContent = tasks.length; }
  else { badge.style.display = "none"; }
}

function renderBadges() {
  CATEGORIES.forEach(cat => {
    const qs = getCatQuestions(cat.id);
    const fails = qs.filter(q => isPass(q, getResponse(q.id)) === false).length;
    const el = document.getElementById("badge-" + cat.id);
    if (el) {
      if (fails > 0) { el.textContent = fails; el.className = "tab-badge has-fails"; el.style.display = "inline-flex"; }
      else { el.style.display = "none"; }
    }
  });
}

function renderQuestion(q) {
  const val = getResponse(q.id);
  const p = isPass(q, val);
  const comment = getComment(q.id);
  const showTask = q.task && p === false;
  const cat = CATEGORIES.find(c => c.id === q.cat);

  let control = "";
  if (q.type === "pf") {
    control = `
<div class="response-row">
  <button class="pf-btn ${val==='pass'?'selected-pass':''}" onclick="respond('${q.id}','pass')">✓ Pass</button>
  <button class="pf-btn ${val==='fail'?'selected-fail':''}" onclick="respond('${q.id}','fail')">✗ Fail</button>
  <button class="pf-btn ${val==='na'?'selected-na':''}" onclick="respond('${q.id}','na')">N/A</button>
</div>`;
  } else if (q.type === "rating") {
    const rv = val ? parseInt(val) : 0;
    control = `
<div>
  <div class="rating-row">
    ${[1,2,3,4,5].map(n => {
      let cls = "";
      if (rv === n) cls = n <= 2 ? "selected-low" : n === 3 ? "selected-mid" : "selected";
      return `<button class="rating-btn ${cls}" onclick="respond('${q.id}','${n}')">${n}</button>`;
    }).join("")}
  </div>
  <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-hint);margin-top:4px;"><span>Poor</span><span>Excellent</span></div>
</div>`;
  } else if (q.type === "temp") {
    const hint = q.id.startsWith("BOH") ? "35–41°F (cooler)" : "≥140°F (hot holding) or ≥165°F (cooking)";
    control = `
<div>
  <input class="temp-input" type="number" inputmode="decimal" placeholder="Enter temp in °F" value="${val||''}" id="temp-${q.id}" onchange="respond('${q.id}',this.value)" oninput="liveTemp('${q.id}',this.value)">
  <div style="font-size:11px;color:var(--text-muted);margin-top:4px;text-align:center;">${hint}</div>
</div>`;
  }

  let statusHtml = "";
  if (p === true) statusHtml = `<span class="status-pass"><span class="status-dot dot-pass"></span> Pass</span>`;
  else if (p === false) statusHtml = `<span class="status-fail"><span class="status-dot dot-fail"></span> Fail</span>`;

  return `
<div class="question-item" id="qi-${q.id}">
  <div class="q-header">
    <span class="q-id">${q.id}</span>
    <span class="q-text">${q.text}</span>
    ${statusHtml}
  </div>
  <div class="q-meta">
    <span class="chip chip-pts">${q.pts} pts</span>
    ${q.critical ? '<span class="chip chip-critical">⚠ Critical</span>' : ''}
    ${q.task ? '<span class="chip chip-task">⚑ Auto-task</span>' : ''}
  </div>
  ${control}
  <div class="task-flag ${showTask ? 'visible' : ''}" id="tf-${q.id}">
    <div class="task-flag-header">⚑ Task will be generated</div>
    <p><strong>${q.taskTitle}</strong><br>Assignee: ${q.taskRole} · Priority: <strong style="color:${q.taskPriority==='Critical'?'var(--red)':q.taskPriority==='High'?'#A32D2D':q.taskPriority==='Medium'?'#7B4400':'#1B5E20'}">${q.taskPriority}</strong> · Due: ${q.taskDue === 0 ? 'Immediately' : 'Within ' + q.taskDue + ' day' + (q.taskDue!==1?'s':'')}</p>
  </div>
  <div class="comment-toggle" onclick="toggleComment('${q.id}')">
    <span style="font-size:14px;">💬</span> ${comment ? 'Edit comment' : 'Add comment'}
  </div>
  <div class="comment-box ${comment ? 'visible' : ''}" id="cb-${q.id}">
    <textarea rows="2" placeholder="Observations, photos note, corrective action…" style="margin-top:6px;" oninput="setComment('${q.id}',this.value)">${comment}</textarea>
  </div>
</div>`;
}

function respond(id, val) {
  setResponse(id, val);
  const q = QUESTIONS.find(q => q.id === id);
  const p = isPass(q, val);
  const tf = document.getElementById("tf-" + id);
  if (tf) { if (q.task && p === false) tf.classList.add("visible"); else tf.classList.remove("visible"); }
  // re-render just this question item
  const el = document.getElementById("qi-" + id);
  if (el) el.outerHTML = renderQuestion(q);
  updateProgress();
  renderBadges();
  renderTasksPanel();
  updateStoreStats();
}

function liveTemp(id, val) {
  if (!val) return;
  respond(id, val);
}

function toggleComment(id) {
  const cb = document.getElementById("cb-" + id);
  if (cb) cb.classList.toggle("visible");
}

function switchCat(catId) {
  state.currentCat = catId;
  const mc = document.getElementById("main-content");
  if (document.getElementById("screen-audit")) {
    mc.innerHTML = renderAuditScreen();
  }
}

function prevCat() {
  const idx = CATEGORIES.findIndex(c => c.id === state.currentCat);
  if (idx > 0) switchCat(CATEGORIES[idx-1].id);
}
function nextCat() {
  const idx = CATEGORIES.findIndex(c => c.id === state.currentCat);
  if (idx < CATEGORIES.length-1) switchCat(CATEGORIES[idx+1].id);
}

  } else {
    content = tasks.map(q => {
      const pc = q.taskPriority === "Critical" ? "p-critical" : q.taskPriority === "High" ? "p-high" : q.taskPriority === "Medium" ? "p-medium" : "p-low";
      const due = q.taskDue === 0 ? "Immediately" : "Within " + q.taskDue + " day" + (q.taskDue !== 1 ? "s" : "");
      return `<div class="task-item">
        <div class="task-title-row">
          <div class="task-title">${q.taskTitle}</div>
          <span class="priority-pill ${pc}">${q.taskPriority}</span>
        </div>
        <div class="task-meta">${q.id} · ${q.taskRole} · Due: ${due}</div>
      </div>`;
    }).join("");
  }
  const panel = document.getElementById("tasks-panel");
  if (panel) panel.innerHTML = content;
}

function renderTasksScreen() {
  const tasks = getFailedTasks();
  let content = tasks.length === 0
    ? `<div class="empty-state"><div class="empty-state-icon">✅</div><p>No tasks flagged yet.<br>Failures during the audit will appear here automatically.</p></div>`
    : tasks.map(q => {
        const pc = q.taskPriority === "Critical" ? "p-critical" : q.taskPriority === "High" ? "p-high" : q.taskPriority === "Medium" ? "p-medium" : "p-low";
        const due = q.taskDue === 0 ? "Immediately" : "Within " + q.taskDue + " day" + (q.taskDue !== 1 ? "s" : "");
        return `<div class="task-item">
          <div class="task-title-row">
            <div class="task-title">${q.taskTitle}</div>
            <span class="priority-pill ${pc}">${q.taskPriority}</span>
          </div>
          <div class="task-meta">${q.id} · Assignee: ${q.taskRole} · Due: ${due}</div>
          ${getComment(q.id) ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px;font-style:italic;">"${getComment(q.id)}"</div>` : ""}
        </div>`;
      }).join("");

  return `
<div class="screen active" id="screen-tasks">
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon" style="background:#FFF3CD;font-size:18px;">⚡</div>
      <div>
        <div class="card-title">Auto-Generated Tasks</div>
        <div class="card-subtitle">${tasks.length} task${tasks.length !== 1 ? "s" : ""} from audit failures</div>
      </div>
    </div>
    <div id="tasks-panel">${content}</div>
  </div>
  ${tasks.length > 0 ? `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    <div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px;text-align:center;">
      <div style="font-size:22px;font-weight:700;color:var(--red);">${tasks.filter(t=>t.taskPriority==="Critical").length}</div>
      <div style="font-size:11px;color:var(--text-muted);">Critical</div>
    </div>
    <div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px;text-align:center;">
      <div style="font-size:22px;font-weight:700;color:#A32D2D;">${tasks.filter(t=>t.taskPriority==="High").length}</div>
      <div style="font-size:11px;color:var(--text-muted);">High priority</div>
    </div>
  </div>` : ""}
</div>`;
}

// SUBMIT SCREEN
function renderSubmitScreen() {
  const s = getTotalScore();
  const pct = s.total > 0 ? Math.round((s.earned / s.total) * 100) : 0;
  const passing = pct >= 90;
  const tasks = getFailedTasks();

  const catRows = CATEGORIES.map(cat => {
    const qs = getCatQuestions(cat.id);
    const earned = qs.reduce((a,q) => a + getScore(q).earned, 0);
    const total = qs.reduce((a,q) => a + q.pts, 0);
    const answered = qs.filter(q => getScore(q).answered).length;
    const p = total > 0 ? Math.round((earned / total) * 100) : null;
    const cat_ = CATEGORIES.find(c => c.id === cat.id);
    return `<div class="cat-score-row">
      <span>${cat_.icon} ${cat.label}</span>
      <span style="display:flex;align-items:center;gap:6px;">
        <span style="font-size:11px;color:var(--text-muted);">${answered}/${qs.length} done</span>
        <span style="font-weight:600;color:${p===null?'var(--text-muted)':p>=90?'var(--pass)':'var(--fail)'}">${p !== null ? p + "%" : "—"}</span>
      </span>
    </div>`;
  }).join("");

  return `
<div class="screen active" id="screen-submit">
  <div class="card">
    <div class="submit-card">
      <div class="submit-icon ${passing ? 'ok' : 'warn'}">${passing ? '✅' : '⚠️'}</div>
      <div style="font-size:32px;font-weight:700;color:${passing?'var(--pass)':'var(--red)'};">${pct}%</div>
      <div style="font-size:16px;font-weight:600;margin:4px 0 2px;">${passing ? "Audit Passing" : "Audit Failing"}</div>
      <div style="font-size:13px;color:var(--text-muted);">${s.earned} / ${s.total} points · ${s.answered} of ${s.count} answered</div>
      <div class="score-track" style="margin:14px 0 0;">
        <div class="score-fill ${passing ? 'passing' : ''}" style="width:${pct}%;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:4px;">
        <span>0%</span><span style="color:var(--pass);">90% threshold</span><span>100%</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-header-icon" style="background:#E8F4FD;font-size:18px;">🏪</div>
      <div><div class="card-title">Audit Summary</div></div>
    </div>
    <div class="card-body" style="font-size:13px;">
      <div style="display:grid;gap:6px;">
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">Store</span><span style="font-weight:600;">${state.storeInfo ? state.storeInfo.name : "—"}</span></div>
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">Auditor</span><span>${state.auditorName || "—"}</span></div>
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">Date</span><span>${state.auditDate}</span></div>
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">Audit type</span><span>${state.auditType}</span></div>
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">Tasks generated</span><span style="font-weight:600;color:var(--red);">${tasks.length}</span></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-header-icon" style="background:#E8F5E9;font-size:18px;">📊</div>
      <div><div class="card-title">Category Breakdown</div></div>
    </div>
    <div class="card-body">${catRows}</div>
  </div>

  <button class="btn btn-primary btn-full" onclick="submitAudit()" style="margin-bottom:8px;">Submit Audit & Send Tasks</button>
  <button class="btn btn-secondary btn-full" onclick="exportAudit()">Export as JSON</button>
</div>`;
}

function submitAudit() {
  if (!state.storeId) { showToast("Please complete store setup first"); showSection("store"); return; }
  showToast("✅ Audit submitted! Tasks sent to " + (state.storeInfo ? state.storeInfo.gm : "manager"));
}

function exportAudit() {
  const payload = {
    auditMeta: { storeId: state.storeId, storeName: state.storeInfo?.name, auditor: state.auditorName, date: state.auditDate, type: state.auditType },
    score: getTotalScore(),
    responses: state.responses,
    comments: state.comments,
    generatedTasks: getFailedTasks().map(q => ({ id: q.id, task: q.taskTitle, role: q.taskRole, priority: q.taskPriority, dueInDays: q.taskDue }))
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `panda_audit_${state.storeId || "draft"}_${state.auditDate}.json`;
  a.click();
  showToast("Exported audit JSON");
}

function updateStoreStats() {
  const s = getTotalScore();
  const pct = s.total > 0 && s.answered > 0 ? Math.round((s.earned / s.total) * 100) + "%" : "—";
  const el_a = document.getElementById("qs-answered");
  const el_t = document.getElementById("qs-tasks");
  const el_s = document.getElementById("qs-score");
  const el_p = document.getElementById("qs-pct");
  if (el_a) el_a.textContent = s.answered;
  if (el_t) el_t.textContent = getFailedTasks().length;
  if (el_s) el_s.textContent = s.earned;
  if (el_p) el_p.textContent = pct;
}

// NAVIGATION
function showSection(sec) {
  state.currentSection = sec;
  const mc = document.getElementById("main-content");
  if (sec === "store") mc.innerHTML = renderStoreScreen();
  else if (sec === "audit") mc.innerHTML = renderAuditScreen();
  else if (sec === "tasks") mc.innerHTML = renderTasksScreen();
  else if (sec === "submit") mc.innerHTML = renderSubmitScreen();

  ["store","audit","tasks","submit"].forEach(s => {
    const el = document.getElementById("bnav-" + s);
    if (el) el.classList.toggle("active", s === sec);
  });

  updateProgress();
  renderBadges();
  if (sec === "store") updateStoreStats();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

// INIT
showSection("store");
</script>
</body>
</html>
